version: 0.2

env:
  variables:
    AWS_DEFAULT_REGION: "us-east-2"
    ECR_REPOSITORY: "fargate_service"

phases:
  pre_build:
    commands:
      - echo "Iniciando sesión en Amazon ECR..."
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_URI="$ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_URI
      - echo "Preparando tags..."
      - BRANCH_TAG=$(echo "${BRANCH_NAME:-latest}" | sed 's/[^a-zA-Z0-9._-]/-/g')
      - REPO_LATEST="$ECR_URI/$ECR_REPOSITORY:${BRANCH_TAG}"
      - docker buildx create --use || true

  build:
    commands:
      - echo "Construyendo imagen para $REPO_LATEST..."
      # Escrito en una sola línea para evitar errores de indentación de YAML
      - docker buildx build --platform linux/amd64 -t "$REPO_LATEST" --push .

  post_build:
    commands:
      - echo "¡Listo! La imagen ya está en ECR."
      - echo "URL de la imagen -> $REPO_LATEST"
